side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="embeddium"
mandatory=false
versionRange="[0,)"
ordering="BEFORE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="rubidium"
mandatory=false
versionRange="[0,)"
ordering="BEFORE"
side="CLIENT"
